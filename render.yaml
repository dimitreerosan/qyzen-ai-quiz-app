# Render Blueprint — deploys run migrations + collectstatic (required for DB tables + Whitenoise).
# Existing service: Dashboard → Settings → set Root Directory = backend, Build Command = buildCommand below.
services:
  - type: web
    name: qyzen-ai-quiz-app
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate --no-input && python manage.py collectstatic --no-input
    startCommand: gunicorn qyzen.wsgi:application